services:
  app:
    build: .
    ports:
      - 80:80
      - 8443:8443
      - 22345:22345
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/main
      SPRING_DATASOURCE_USERNAME: cat
      SPRING_DATASOURCE_PASSWORD: meow
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
    depends_on:
      - db
    volumes:
      - ./config:/app/config
      - ./data:/app/data
  db:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: meow
      MYSQL_DATABASE: main
      MYSQL_USER: cat
      MYSQL_PASSWORD: meow
    ports:
      - ${AQUADX_DB_PORT:-127.0.0.1:3369}:3306
    volumes:
      - ${AQUADX_DB_DATA:-mariadb_data}:/var/lib/mysql
  imagor:
    image: shumc/imagor:latest
    volumes:
      - ./data/tmp:/mnt/data
    ports:
      - 8000:8000
    environment:
      PORT: 8000
      IMAGOR_UNSAFE: 1
      IMAGOR_AUTO_WEBP: 1
      FILE_LOADER_BASE_DIR: /mnt/data

volumes:
  mariadb_data: